services:
  - type: web
    name: empyrean-hero-api
    runtime: node
    plan: free
    buildCommand: pnpm install && pnpm --filter @empyrean-hero/engine build && pnpm --filter @empyrean-hero/server build
    startCommand: node packages/server/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        value: https://empyrean-hero-client.onrender.com
  - type: static_site
    name: empyrean-hero-client
    buildCommand: pnpm install && pnpm --filter @empyrean-hero/engine build && pnpm --filter @empyrean-hero/client build
    staticPublishPath: packages/client/dist
    envVars:
      - key: VITE_SERVER_URL
        value: https://empyrean-hero-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
